<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link rel="icon" href="{{ url_for('static', filename='images/recycle.png') }}" type="image/png">

    <!-- AOS -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1f4037, black);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }

            100% {
                background-position: 0% 50%
            }
        }

        /* HEADER */

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo svg {
            width: 50px;
            height: 50px;
        }

        .logo-text h1 {
            font-size: 24px;
            letter-spacing: 1px;
        }

        .logo-text span {
            font-size: 12px;
            color: #cfd8dc;
        }

        nav a {
            margin-left: 30px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            position: relative;
        }

        nav a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: #2ecc71;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Highlight current page */
        nav a.active::after {
            width: 100%;
        }

        /* LOGIN */

        .login-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
            padding-top: 80px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 18px;
            width: 380px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #2ecc71;
        }

        .login-box p {
            font-size: 14px;
            color: #cfd8dc;
            margin-bottom: 25px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 15px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .error {
            color: #ff6b6b;
            margin-bottom: 10px;
            font-size: 14px;
        }

        footer {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 13px;
            color: #b0bec5;
            z-index: 2;
        }
    </style>
</head>

<body>

    <!-- PARTICLES -->
    <div id="particles-js"></div>

    <!-- HEADER -->

    <header>
        <div class="logo">
            <!-- SVG LOGO -->
            <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="256" cy="256" r="200" stroke="#2ecc71" stroke-width="40" />
                <path d="M256 56v100l80 80" stroke="#2ecc71" stroke-width="40" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            <div class="logo-text">
                <h1>Zero Food Waste</h1>
                <span> Eco Friendly Platform</span>
            </div>
        </div>

        <nav>
            <a href="/">Home</a>
            <a href="/predict">Predict Wastage</a>
            <a href="/donor">Donate Food</a>
            <a href="/receiver">Receive</a>
            <a href="/volunteer_dashboard">Volunteer</a>
            <a href="/admin" class="active">Admin</a>

        </nav>
    </header>


    <!-- LOGIN -->

    <div class="login-container">

        <div class="login-box" data-aos="zoom-in">

            <h2>🔐 Admin Login</h2>

            <p>Secure access to system dashboard</p>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">

                <input type="text" name="username" placeholder="Enter Username" required>

                <input type="password" name="password" placeholder="Enter Password" required>

                <button type="submit">Login</button>


            </form>

        </div>

    </div>


    <!-- FOOTER -->

    <footer>
        © 2026 Zero Food Waste System
    </footer>


    <!-- SCRIPTS -->

    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

    <script>
        AOS.init({ duration: 1000, once: true });

        particlesJS("particles-js", {
            particles: {
                number: { value: 60 },
                color: { value: "#2ecc71" },
                size: { value: 4 },
                move: { speed: 2 },
                line_linked: {
                    enable: true,
                    distance: 120,
                    color: "#2ecc71",
                    opacity: 0.2
                }
            },
            interactivity: {
                events: {
                    onhover: { enable: true, mode: "repulse" },
                    onclick: { enable: true, mode: "push" }
                }
            },
            retina_detect: true
        });
    </script>

</body>

</html>
